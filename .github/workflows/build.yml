name: Build s9pk

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download start-cli
        run: |
          curl -L -o start-cli.tar.gz "https://github.com/smallblocks/staticrypt-startos/releases/download/tools-v1/start-cli-linux-x86_64.tar.gz"
          tar xzf start-cli.tar.gz
          chmod +x start-cli
          sudo mv start-cli /usr/local/bin/

      - name: Install squashfs-tools-ng
        run: sudo apt-get update && sudo apt-get install -y squashfs-tools-ng

      - name: Initialize signing key
        run: start-cli init-key

      - name: Build Docker image
        working-directory: ten31-tasks
        run: docker build -t ten31-tasks:latest .

      - name: Tag image for start-cli
        run: docker tag ten31-tasks:latest ten31-tasks:latest

      - name: Pack s9pk
        working-directory: ten31-tasks
        run: start-cli pack

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ten31-tasks-s9pk
          path: ten31-tasks/ten31-tasks.s9pk

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: Dev Build (Latest)
          prerelease: true
          files: ten31-tasks/ten31-tasks.s9pk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
