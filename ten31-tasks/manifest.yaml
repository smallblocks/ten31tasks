id: ten31-tasks
title: "Ten31 Tasks"
version: "0.2.0"
release-notes: |
  v0.2.0 — Server-side persistence via FastAPI + SQLite.
  Auto-saves on every keystroke and action. Team data is shared
  across all browsers hitting the same instance.
license: MIT
wrapper-repo: https://github.com/smallblocks/ten31-tasks
upstream-repo: https://github.com/smallblocks/ten31-tasks
support-site: https://github.com/smallblocks/ten31-tasks/issues
marketing-site: https://ten31.xyz
build: ["make"]
description:
  short: "Team daily task tracker — six things, in order"
  long: |
    A self-hosted team productivity tool for Ten31.

    Each team member gets their own route (/list/<name>) and writes
    down the six most important things they need to accomplish tomorrow.
    Lock the list in. Work top-down. Check off as you go.

    The team board gives everyone full visibility into who has committed,
    what they're working on, and their completion rate — a natural
    feedback loop of accountability.

    Auto-saves every keystroke to server-side SQLite. No save button.

    Features:
    - Per-user task lists at /list/<name>
    - Team board with full task visibility
    - Calendar heatmap with monthly stats
    - Streak tracking and 7-day rolling completion
    - End-of-day reflection journal
    - Carry-forward for unfinished tasks
assets:
  license: LICENSE
  icon: icon.png
  instructions: INSTRUCTIONS.md
main:
  type: docker
  image: main
  entrypoint: "supervisord"
  args: ["-c", "/etc/supervisor/supervisord.conf"]
  mounts:
    main:
      type: volume
      read-only: false
health-checks:
  web-ui:
    name: Web UI
    success-message: Ten31 Tasks is ready
    type: docker
    image: main
    entrypoint: "sh"
    args: ["-c", "curl -sf http://localhost:80/api/team > /dev/null"]
    interval: 30s
    timeout: 10s
    start-period: 20s
    system: false
interfaces:
  main:
    name: Ten31 Tasks
    description: Team daily task tracker
    tor-config:
      port-mapping:
        80: "80"
    lan-config:
      443:
        ssl: true
        internal: 80
    ui: true
    protocols:
      - tcp
      - http
volumes:
  main:
    type: data
config: ~
properties: ~
dependencies: {}
backup:
  create:
    type: docker
    image: main
    entrypoint: "sh"
    args: ["-c", "cp /data/ten31-tasks.db /backup/ten31-tasks.db 2>/dev/null || true"]
  restore:
    type: docker
    image: main
    entrypoint: "sh"
    args: ["-c", "cp /backup/ten31-tasks.db /data/ten31-tasks.db 2>/dev/null || true"]
migrations: ~
